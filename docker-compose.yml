services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DB/Redis URLs to use Docker service names
      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@db:5432/d2lnotion
      REDIS_URL: redis://cache:6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: d2lnotion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # exposed so you can connect with psql / TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d d2lnotion"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: